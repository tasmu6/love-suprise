<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ultimate Love Surprise</title>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  transition:1s;
}

/* fade */
.fade{
  animation:fade 1s;
}
@keyframes fade{
  from{opacity:0}
  to{opacity:1}
}

/* card */
.card{
  background:white;
  color:black;
  padding:25px;
  border-radius:20px;
  text-align:center;
  width:350px;
  box-shadow:0 0 30px #ff4d6d;
  transition:1s;
}

/* neon glow effect */
.glow{
  box-shadow:0 0 20px #ff4d6d, 0 0 40px #ff4d6d, 0 0 60px #ff4d6d;
  animation:glowPulse 1.5s infinite alternate;
}
@keyframes glowPulse{
  from{box-shadow:0 0 20px #ff4d6d,0 0 40px #ff4d6d,0 0 60px #ff4d6d;}
  to{box-shadow:0 0 40px #ff4d6d,0 0 80px #ff4d6d,0 0 120px #ff4d6d;}
}

/* gift */
.gift{
  font-size:50px;
  cursor:pointer;
  animation:bounce 1s infinite alternate;
  transition:1s;
}
.gift:hover{
  transform:scale(1.3) rotate(10deg);
  box-shadow:0 0 25px gold;
}
@keyframes bounce{
  from{transform:translateY(0)}
  to{transform:translateY(-10px)}
}

/* hearts */
.heart{
  position:absolute;
  font-size:20px;
  animation:float 6s linear infinite;
}
@keyframes float{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

/* cake blow */
.candle-blow{
  animation:blow 0.5s infinite alternate;
  cursor:pointer;
}
@keyframes blow{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}

/* sparkling stars */
.star{
  position:absolute;
  font-size:15px;
  color:gold;
  animation:twinkle 1s infinite alternate;
}
@keyframes twinkle{
  0%{opacity:0.2; transform:scale(1)}
  50%{opacity:1; transform:scale(1.5)}
  100%{opacity:0.2; transform:scale(1)}
}

/* confetti */
.confetti{
  position:absolute;
  font-size:20px;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  0%{transform:translateY(0) rotate(0deg);}
  100%{transform:translateY(100vh) rotate(360deg);}
}

button{
  margin:8px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
  cursor:pointer;
}
button.disabled{
  opacity:0.5;
  cursor:not-allowed;
}
</style>
</head>

<body>

<audio id="bgMusic" loop>
  <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<script>
  // Play music after first click on page
  document.body.addEventListener('click', ()=>{
    document.getElementById('bgMusic').play();
  }, {once:true});
</script>


<div class="card fade glow" id="card">
  <h2>Hey baby! Something special for you… 💖</h2>
  <div onclick="next()" style="font-size:70px;cursor:pointer;">🎁</div>
</div>

<script>
/* Floating hearts */
setInterval(()=>{
  let h=document.createElement("div")
  h.className="heart"
  h.innerHTML="💖"
  h.style.left=Math.random()*100+"%"
  document.body.appendChild(h)
  setTimeout(()=>h.remove(),6000)
},600)

/* Random sparkles */
setInterval(()=>{
  let s=document.createElement("div")
  s.className="star"
  s.innerHTML="✨"
  s.style.left=Math.random()*100+"%"
  s.style.top=Math.random()*80+"%"
  document.body.appendChild(s)
  setTimeout(()=>s.remove(),1200)
},500)

let step=0
let correctPass="I"
const card=document.getElementById("card")

function run(btn){
  btn.style.position="absolute"
  btn.style.left=Math.random()*250+"px"
  btn.style.top=Math.random()*200+"px"
}

function next(){
  step++
  card.classList.add("fade")

  switch(step){
    case 1:
      card.innerHTML=`<h2>Do you know what this is?</h2>
        <button onclick="next()">Yes</button>
        <button onclick="next()">No 😏</button>`;
      break
    case 2:
      card.innerHTML=`<h2>Now tell me, you are mine?</h2>
        <button onclick="next()">Yes 💖</button>
        <button onclick="next()">Of course baby 💞</button>`;
      break
    case 3:
      card.innerHTML=`<h2>Wanna go next?</h2>
        <button onclick="next()">Yes</button>
        <button onclick="next()">Maybe 🤔</button>`;
      break
    case 4:
      card.innerHTML=`<h2>Are you sure?</h2>
        <button onclick="next()">Confused 😅</button>
        <button onclick="next()">Yes 💖</button>`;
      break
    case 5:
      card.innerHTML=`<h2>Wanna turn back?</h2>
        <button onclick="next()">No 🚫</button>
        <button onclick="next()">Next ➡️</button>`;
      break
    case 6:
      card.innerHTML=`<h2>There is no door left to turn back, haha 😏</h2>
        <button onclick="next()">Okay 😎</button>`;
      break
    case 7:
      card.innerHTML=`<h2>Wanna guess what's inside? 🎁</h2>
        <button onclick="next()">Yes 💖</button>`;
      break
    case 8:
      card.innerHTML=`<h2>Readyyyy????</h2>
        <button onclick="next()">Yes 💞</button>`;
      break
    case 9:
      countdown()
      break
    case 10:
      showGifts()
      break
  }
}

/* Countdown */
function countdown(){
  let n=3
  card.innerHTML=`<h1>${n}</h1>`
  let c=setInterval(()=>{
    n--
    if(n==0){
      clearInterval(c)
      next()
    }else{
      card.innerHTML=`<h1>${n}</h1>`
    }
  },1000)
}

/* Gifts */
function showGifts(){
  card.innerHTML=`<h2>Choose your gift 🎁</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
      <div onclick="openGift(1)" class="gift">🎁</div>
      <div onclick="openGift(2)" class="gift">🎁</div>
      <div onclick="openGift(3)" class="gift">🎁</div>
      <div onclick="lockedGift()" class="gift">🔒</div>
    </div>`;
}

/* Open gifts */
function openGift(n){
  if(n==1){
    card.innerHTML=`<h2>Memory 📸</h2>
      <img src="Photo1.jpg" width="200"><br>
      <img src="peach-goma-hug.gif" width="150"><br>
      <button onclick="showGifts()">Back</button>`;
  }

  if(n==2){
    card.innerHTML = `
      <h2>Wish 💌</h2>
      <div id="envelope" style="width:250px; margin:20px auto; text-align:center; cursor:pointer;">
        <!-- Closed envelope -->
        <div id="closedEnv" style="
          width:250px; height:150px; background:#ff4d6d; border-radius:10px;
          display:flex; justify-content:center; align-items:center;
          color:white; font-weight:bold; font-size:18px; box-shadow:0 0 15px #ff4d6d;
          transition:0.5s;">
          ✉️ Click to Open
        </div>

        <!-- Open envelope (hidden at first) -->
        <div id="openEnv" style="
          display:none; background:white; color:black; padding:15px; border-radius:10px;
          text-align:left; font-size:14px; box-shadow:0 0 15px gold; line-height:1.5;">
          <p>
Happy birthday, Pijj Baby ❤️

My half, my comfort zone, my mood-maker…  
I’m so happy that you were born 23 years ago today.

I just want you to know that you are the biggest blessing in my life.  
You are that person who unexpectedly became the best part of my life.

All I want is to see you happy and to make you happy —  
that’s the only wish I want to come true on your birthday.

Shoutout to 28 March 2003  
for bringing my healer into this world.

I won’t say much more…  
just this — be happy and be mine, dear baby 💖
          </p>
          <button onclick="showGifts()" style="margin-top:10px;">Back</button>
        </div>
      </div>
    `;

    // Click to open envelope
    document.getElementById("closedEnv").onclick = function(){
      let env = document.getElementById("closedEnv");
      env.style.transform = "rotateX(180deg)";
      env.style.transition = "0.8s";
      setTimeout(()=>{
        env.style.display = "none";
        document.getElementById("openEnv").style.display = "block";
      },800);
    }
  }

  if(n==3){
    card.innerHTML=`<h2>Cake 🎂</h2>
      <div onclick="blowCandles()" class="candle-blow" style="font-size:70px">🎂</div>
      <p>Blow the candles! 🎉</p>
      <button onclick="showGifts()">Back</button>`;
  }
}

/* Cake blow hearts */
function blowCandles(){
  for(let i=0;i<20;i++){
    let h=document.createElement("div")
    h.className="heart"
    h.innerHTML="💖"
    h.style.left=(Math.random()*100)+"%"
    h.style.top="80%"
    h.style.fontSize=(10+Math.random()*20)+"px"
    document.body.appendChild(h)
    setTimeout(()=>h.remove(),3000)
  }
}

/* Locked gift */
function lockedGift(){
  card.innerHTML=`<h2>🔐 Locked Gift</h2>
    <p>Clue: LCS</p>
    <input id="pass" placeholder="Enter password">
    <br><br>
    <button onclick="checkPass()">Unlock</button>
    <button onclick="showGifts()">Back</button>`;
}

/* Check password with confetti */
function checkPass(){
  let user=document.getElementById("pass").value
  if(user===correctPass){
    card.innerHTML=`<h2>Unlocked 💖</h2>
      <img src="Peach-goma-love.gif" width="150"><br>
      <img src="peach-goma-kiss.gif" width="150"><br>
      <img src="Peach-goma-hugg.gif" width="150"><br>
      <p>I love you my Pijj Baby 💞</p>
      <button onclick="finalStep()">Next</button>`;
    explodeConfetti()
  } else{
    alert("Wrong password 😏")
  }
}

/* Confetti explosion */
function explodeConfetti(){
  for(let i=0;i<50;i++){
    let c=document.createElement("div")
    c.className="confetti"
    c.innerHTML="🎉"
    c.style.left=Math.random()*100+"%"
    c.style.top="-10px"
    c.style.fontSize=(10+Math.random()*20)+"px"
    document.body.appendChild(c)
    setTimeout(()=>c.remove(),3000)
  }
}

/* Final steps */
function finalStep(){
  card.innerHTML=`<h2>Are you my babe? 💘</h2>
    <button onclick="finalMessage()">Yes 💖</button>
    <button class="disabled">No 🚫</button>`;
}

function finalMessage(){
  card.innerHTML=`<h2>For you 🌙</h2>
    <p>You deserve the world baby 💖<br><br>
       I wanted to give you the moon you asked me…<br>
       But its impossible. so,here is a little moon for you baby boy 😘</p>
    <div style="font-size:80px">🌙</div>`;
}
</script>

</body>
</html>
